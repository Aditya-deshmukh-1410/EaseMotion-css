<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smooth Center Reveal Utility</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="page">
        <h1>Smooth Center Reveal Utility</h1>
        <p class="intro">Hover over each card to reveal the content from the center outward.</p>

        <section class="grid">
            <article class="card ease-center-reveal">
                <h2>Portfolio</h2>
                <p>Reveal project details with a smooth center animation.</p>
            </article>

            <article class="card ease-center-reveal">
                <h2>Product</h2>
                <p>Highlight features with a clean interactive effect.</p>
            </article>

            <article class="card ease-center-reveal">
                <h2>Gallery</h2>
                <p>Add motion to image cards, banners, and showcases.</p>
            </article>
        </section>
    </main>
</body>

</html>
